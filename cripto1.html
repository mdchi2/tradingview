<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Tracker Pro - Gráfico de Trading en Tiempo Real</title>
    <meta name="description" content="Gráfico avanzado en tiempo real para el seguimiento del precio de Bitcoin (BTC), con indicadores técnicos e interactividad completa.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-darkest: #08090c;
            --bg-dark: #0f111a;
            --bg-card: rgba(18, 22, 33, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-orange: #f7931a;
            --accent-orange-glow: rgba(247, 147, 26, 0.25);
            --accent-orange-hover: #ff9f29;
            --text-primary: #f0f2f5;
            --text-secondary: #848e9c;
            --font-title: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-darkest);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(247, 147, 26, 0.04) 0%, transparent 60%);
        }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-darkest);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Contenido Principal */
        main {
            flex: 1;
            padding: 1.5rem;
            max-width: 1800px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-content: center;
        }

        @media (max-width: 1100px) {
            main {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
            .chart-panel {
                height: 500px !important;
                min-height: auto !important;
            }
        }

        /* Contenedor del Gráfico Completo */
        .chart-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: calc(100vh - 140px);
            min-height: 580px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        .panel-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            background: rgba(15, 17, 26, 0.4);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title h2 {
            font-family: var(--font-title);
            font-size: 1.05rem;
            font-weight: 600;
        }

        .panel-title .badge {
            background: var(--accent-orange-glow);
            color: var(--accent-orange);
            border: 1px solid rgba(247, 147, 26, 0.2);
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 6px;
        }

        /* Selectores de Par de Trading */
        .pair-selector {
            display: flex;
            gap: 0.25rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .pair-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 4px 8px;
            font-family: var(--font-body);
            font-size: 0.68rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition-speed);
        }

        .pair-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .pair-btn.active {
            color: #ffffff;
            background: var(--accent-orange);
            box-shadow: 0 2px 8px var(--accent-orange-glow);
        }

        /* Contenedor del Widget del Gráfico */
        .chart-widget-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #131722; /* Color de fondo nativo de TradingView Dark */
            overflow: hidden;
        }

        .chart-widget-container iframe {
            width: 111.11% !important;
            height: 111.11% !important;
            transform: scale(0.9);
            transform-origin: 0 0;
            border: none;
        }

        /* Footer */
        footer {
            background: rgba(8, 9, 12, 0.95);
            border-top: 1px solid var(--border-color);
            padding: 1.25rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: auto;
        }

        .copyright-link {
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-speed);
        }

        .copyright-link:hover {
            color: var(--accent-orange-hover);
        }

        /* Loader */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-darkest);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.25rem;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(247, 147, 26, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-orange);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            font-family: var(--font-title);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- Pantalla de Carga Premium -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div class="loader-text">Inicializando Gráfico de Trading...</div>
    </div>

    <!-- Contenido Principal -->
    <main>
        
        <!-- Panel Izquierdo (BTC/USDT) -->
        <section class="chart-panel" aria-label="Gráfico interactivo de BTC">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="badge" id="left-pair-badge">BTCUSDT</span>
                </div>
                
                <!-- Selectores de Par Izquierdo -->
                <div class="pair-selector" id="left-selector">
                    <button class="pair-btn active" onclick="switchSymbol('left', 'BINANCE:BTCUSDT', 'BTCUSDT', this)">BTC/USDT</button>
                    <button class="pair-btn" onclick="switchSymbol('left', 'BINANCE:ETHUSDT', 'ETHUSDT', this)">ETH/USDT</button>
                    <button class="pair-btn" onclick="switchSymbol('left', 'CRYPTOCAP:BTC.D', 'Dom %', this)">Dom %</button>
                </div>
            </div>
            
            <!-- Gráfico de TradingView -->
            <div class="chart-widget-container" id="tradingview_left-container">
                <div id="tradingview_left" style="height: 100%; width: 100%;"></div>
            </div>
        </section>

        <!-- Panel Derecho (ETH/USDT) -->
        <section class="chart-panel" aria-label="Gráfico interactivo de ETH">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="badge" id="right-pair-badge">ETHUSDT</span>
                </div>
                
                <!-- Selectores de Par Derecho -->
                <div class="pair-selector" id="right-selector">
                    <button class="pair-btn" onclick="switchSymbol('right', 'BINANCE:BTCUSDT', 'BTCUSDT', this)">BTC/USDT</button>
                    <button class="pair-btn active" onclick="switchSymbol('right', 'BINANCE:ETHUSDT', 'ETHUSDT', this)">ETH/USDT</button>
                    <button class="pair-btn" onclick="switchSymbol('right', 'CRYPTOCAP:BTC.D', 'Dom %', this)">Dom %</button>
                </div>
            </div>
            
            <!-- Gráfico de TradingView -->
            <div class="chart-widget-container" id="tradingview_right-container">
                <div id="tradingview_right" style="height: 100%; width: 100%;"></div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>
            Desarrollado con gráficos profesionales e interactivos de 
            <a href="https://es.tradingview.com/" target="_blank" rel="noopener nofollow" class="copyright-link">TradingView</a>.
        </p>
    </footer>

    <!-- Scripts de TradingView y Lógica del Dashboard -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Cargar widget del gráfico de TradingView para una sección
        function loadChart(containerId, tvSymbol) {
            document.getElementById(containerId + '-container').innerHTML = `<div id="${containerId}" style="height: 100%; width: 100%;"></div>`;
            new TradingView.widget({
                "autosize": true,
                "symbol": tvSymbol,
                "interval": "D",
                "timezone": "America/Argentina/Buenos_Aires",
                "theme": "dark",
                "style": "1",
                "locale": "es",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": containerId
            });
        }

        // Cambiar de Símbolo Activo
        function switchSymbol(side, tvSymbol, displayName, element) {
            // Actualizar badge del par activo
            document.getElementById(`${side}-pair-badge`).innerText = displayName;
            
            // Actualizar estado activo de los botones de esa sección
            const selector = document.getElementById(`${side}-selector`);
            const buttons = selector.querySelectorAll('.pair-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (element) {
                element.classList.add('active');
            } else {
                // Fallback por si se llama desde otra parte sin pasar el elemento
                buttons.forEach(btn => {
                    if (btn.innerText === displayName || 
                        (btn.innerText === 'BTC/USDT' && displayName === 'BTCUSDT') ||
                        (btn.innerText === 'ETH/USDT' && displayName === 'ETHUSDT')) {
                        btn.classList.add('active');
                    }
                });
            }

            // Recargar Gráfico de TradingView en el contenedor respectivo
            loadChart(`tradingview_${side}`, tvSymbol);
        }

        // Inicialización al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            // Inicializar gráficos por defecto
            loadChart('tradingview_left', 'BINANCE:BTCUSDT');
            loadChart('tradingview_right', 'BINANCE:ETHUSDT');

            // Ocultar pantalla de carga
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            }, 600);
        });
    </script>
</body>
</html>
